# This is an example file for docker-compose.
# make sure your docker network has IPv6 enabled.
# see https://docs.docker.com/engine/daemon/ipv6/

services:
  webres6-api:
    image: webres6-api:latest
    pull_policy: build
    build:
      context: .
      dockerfile: api/Dockerfile
      x-bake:
        platforms:
          - linux/amd64
          - linux/arm64
    container_name: webres6-api
    networks:
      - webres6-network
    ports:
      - "6400:6400"
    environment:
      - SELENIUM_REMOTE_URL=http://selenium:4444/wd/hub
      # use external dnsprobe to avoid docker IPv6 issues - comment out to use build-in dnsprobe
      - DNSPROBE_API_URL=https://webres6.dev.sap
      - ENABLE_WHOIS=true
      - VALKEY_URL=valkey://webres6-valkey:6379/0
      - WHOIS_CACHE_TTL=3600
      - RESULT_CACHE_TTL=90
      - RESULT_ARCHIVE_TTL=3600
      - ARCHIVE_DIR=/archive
      # OpenTelemetry configuration
      - OTEL_SERVICE_NAME=webres6-api
      - OTEL_SERVICE_VERSION=1.3.6
      - OTEL_DEPLOYMENT_ENVIRONMENT=development
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://jaeger:4318/v1/traces
      - OTEL_TRACES_SAMPLER=always_on
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=webres6
    volumes:
      - ./local_cache/reports:/archive
    depends_on:
      - selenium
      - valkey
      - jaeger
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6400/healthz"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 20s

  webres6-viewer:
    build: 
      context: .
      dockerfile: viewer/Dockerfile
      x-bake:
        platforms:
          - linux/amd64
          - linux/arm64
    container_name: webres6-viewer
    environment:
      - WEBRES6_API_URL=http://webres6-api:6400/
      - DNSPROBE_API_URL=http://webres6-dnsprobe:6453/
    networks:
      - webres6-network
    ports:
      - "6480:6480"
    volumes:
      - ./local_cache/reports:/usr/share/nginx/html/res6/report:ro
    depends_on:
      - webres6-api
      - webres6-dnsprobe

  webres6-dnsprobe:
    image: webres6-api:latest
    pull_policy: never
    command: ["--dnsprobe-only"]
    networks:
      - webres6-network
    ports:
      - "6453:6453"
    environment:
      # OpenTelemetry configuration
      - OTEL_SERVICE_NAME=dnsprobe
      - OTEL_SERVICE_VERSION=1.1.0
      - OTEL_DEPLOYMENT_ENVIRONMENT=development
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://jaeger:4318/v1/traces
      - OTEL_TRACES_SAMPLER=always_on
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=webres6
    depends_on:
      - jaeger
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6453/healthz"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 20s

  selenium:
    image: selenium/standalone-chromium:4.43.0
    container_name: webres6-selenium
    networks:
      - webres6-network
    # Uncomment below if you want to expose the Selenium Remote
    # ports:
    #   - "4444:4444"

  valkey:
    image: valkey/valkey:9.0
    container_name: webres6-valkey
    networks:
      - webres6-network
    ports:
      - "6379:6379"

  jaeger:
    image: jaegertracing/jaeger:latest
    container_name: jaeger
    networks:
      - webres6-network
    ports:
      - "16686:16686"  # Jaeger UI
      - "4318:4318"    # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true


networks:
  webres6-network:
    enable_ipv6: true

