# Default values for webres6 (IPv6 Web Resource Checker).

# Chart name overrides
nameOverride: ""
fullnameOverride: ""

# Image pull secrets for private registries
imagePullSecrets:
  - name: hyperspace-docker

# Default image for all services unless overridden per-service
image:
  repository: my-repository/  # must end with a slash
  tag: "latest"

# Server message, privacy text, and extension hook configuration
serverconfig:
  privacy: |-
    <p>All data input is processed in accordance with <a href="https://www.sap.com/about/legal/privacy.html">SAP privacy policy</a>.<br/>
    IP addresses resolved by this server my be processed by the WHOIS services of the respective Regional Internet Registries.</p>
  message: ""
  webres6_extension_py: |-
    import sys
    def get_extensions():
        return []
    def check_extension_parameter(extension):
        return False, f'no extensions are supported in this configuration'
    def init_selenium_options(options, extension=None, extension_data=None, log_prefix=""):
        return True
    def prepare_selenium_crawl(driver, url, extension=None, extension_data=None, log_prefix=""):
        return True, ''
    def operate_selenium_crawl(driver, url, extension=None, extension_data=None, log_prefix=""):
        return True, ''
    def cleanup_selenium_crawl(driver, extension=None, extension_data=None, log_prefix=""):
        return
    def finalize_report(report, extension=None, extension_data=None, log_prefix=""):
        return
    print ("loaded empty extension override", file=sys.stderr)
  url_blocklist:
    - ".internal"
    - ".local"
    - ".invalid"
    - "example.com"
    - "example.org"

# API server configuration
api:
  image:
    repository: ""      # overrides image.repository; must end with a slash if set
    name: webres6-api
    tag: ""             # overrides image.tag
    pullPolicy: Always
  port: 6400
  service:
    type: ClusterIP
    port: 80
  # crawl performance
  crawlJobs: 8          # concurrent selenium crawl jobs
  timeout:
    crawl: 180          # max seconds for a full crawl/dnsprobe/whois job
    seleniumMax: 60     # max seconds for individual selenium operations
    seleniumMin: 20     # min seconds for individual selenium operations
  clientRetryBaseTime: 10  # seconds between client retries while a report is in progress
  gunicornThreads: 32
  # whois
  whois:
    enabled: true
    jobs: 32            # concurrent whois lookups; high values may trigger rate limiting
    cacheTTL: "86400"
  # storage
  serviceAccountName: ""
  awsSecret: ""         # Kubernetes secret name with accessKeyID and secretAccessKey keys
  valkeyURL: ""
  s3Bucket: ""
  s3Endpoint: ""
  s3DeliveryStrategy: "presigned"  # "public", "presigned", or "private"
  s3PresignedExpiry: 3600          # seconds; only used when s3DeliveryStrategy is "presigned"
  resultCDNTemplate: ""
  results:
    cacheTTL: "180"
    errorCacheTTL: "90"
    archiveTTL: "7776000"
  # scoreboard
  scoreboard:
    enabled: true
    S3backup: true
    S3backupSchedule: "@daily"
    backupHistoryLimit: 3
    backupResources: {}
  # scaling
  replicas: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1024Mi"
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}

# Selenium hub configuration
seleniumHub:
  url: "http://selenium-hub.default.svc.cluster.local:4444/wd/hub"
  username: "admin"
  password: "admin"

# Prometheus Operator configuration
prometheus:
  enabled: true

# OpenTelemetry configuration
otel:
  enabled: false
  endpoint: "http://otel-collector:4318"
  serviceName: ""       # defaults to "webres6-api" / "webres6-dnsprobe" per service
  environment: "production"
  sampler: "always_on"
  samplerArg: "1.0"
  resourceAttributes: "service.namespace=webres6"

# Viewer (static content) configuration
viewer:
  enabled: true
  image:
    repository: ""      # overrides image.repository; must end with a slash if set
    name: webres6-viewer
    tag: ""             # overrides image.tag
    pullPolicy: Always
  port: 6480
  service:
    type: ClusterIP
    port: 80
  replicas: 1
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}

# DNS probe configuration
dnsprobe:
  mode: "internal"      # "disabled", "internal", "service", or "external"
  url: ""               # only used when mode is "external"
  image:
    repository: ""      # overrides image.repository; must end with a slash if set
    name: webres6-api   # dnsprobe shares the API image, run with --dnsprobe-only
    tag: ""             # overrides image.tag
    pullPolicy: Always
  port: 6453
  service:
    type: ClusterIP
    port: 80
  jobs: 16              # concurrent dnsprobe lookups sent from the API
  workers: 32           # dnsprobe worker processes (used when mode is "service" or "internal")
  gunicornThreads: 24   # gunicorn threads for the dnsprobe service (only when mode is "service")
  replicas: 1
  exposeIngress: false  # expose /dnsprobe path on the ingress
  unboundDebugLevel: ""
  podAnnotations: {}
  podLabels: {}
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"
  podSecurityContext: {}
  securityContext: {}

# MCP server (streamable-http transport) configuration
mcp:
  enabled: false
  image:
    repository: ""      # overrides image.repository; must end with a slash if set
    name: webres6-mcp
    tag: ""             # overrides image.tag
    pullPolicy: Always
  port: 6470
  service:
    type: ClusterIP
    port: 80
  replicas: 1
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - webres6.example.com
  tls:
    - secretName: prod-tls
      hosts:
        - webres6.example.com
  additionalPaths: {}

# .well-known file contents
well_known:
  security.txt: |-
    Contact: mailto:security@example.com

# Admin API key configuration
# When enabled=false, /metrics and /admin/* are unauthenticated (intended for trusted networks).
adminSecret:
  enabled: false
  create: true
  secretName: webres6-admin
  secretKey: admin-key

nodeSelector: {}
tolerations: []
affinity: {}

# curl helper used in Helm tests
curl:
  image:
    repository: curlimages/curl
    tag: "7.72.0"
  securityContext: {}
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
