apiVersion: apps/v1
kind: Deployment
metadata:
  # SPDX-FileCopyrightText: 2025 SAP SE and IPv6 Web Resource Checker contributors
  # SPDX-License-Identifier: Apache-2.0
  name: {{ include "webres6.fullname" . }}-api
  labels:
    {{- include "webres6.labels" . | nindent 4 }}
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicas | default 1 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "webres6.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.prometheus.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "{{ .Values.api.port | default 6400 }}"
        {{- end }}
      labels:
        {{- include "webres6.labels" . | nindent 8 }}
        {{- with .Values.api.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        app: webres6-api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.api.serviceAccountName -}}
      serviceAccountName: {{ .Values.api.serviceAccountName }}
      {{- end }}
      containers:
        - name: webres6-api
          image: {{ .Values.api.image.repository | default "" .Values.image.repository }}{{ .Values.api.image.name | default "webres6-api" }}:{{ .Values.api.image.tag | default "latest" .Values.image.tag }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: DEPLOYMENT
              value: {{ .Release.Name | quote }}
            {{- if .Values.seleniumHub.url }}
            - name: SELENIUM_REMOTE_URL
              value: {{ .Values.seleniumHub.url | quote }}
            {{- end }}
            {{- if .Values.seleniumHub.username }}
            - name: SELENIUM_USERNAME
              value: {{ .Values.seleniumHub.username | quote }}
            {{- end }}
            {{- if .Values.seleniumHub.password }}
            - name: SELENIUM_PASSWORD
              value: {{ .Values.seleniumHub.password | quote }}
            {{- end }}
            {{- if and (eq .Values.dnsprobe.mode "external") .Values.dnsprobe.url }}
            - name: ENABLE_DNSPROBE
              value: "true"
            - name: DNSPROBE_API_URL
              value: {{ .Values.dnsprobe.url | quote }}
            {{- else if eq .Values.dnsprobe.mode "service" }}
            - name: ENABLE_DNSPROBE
              value: "true"
            - name: DNSPROBE_API_URL
              value: "http://{{ include "webres6.fullname" . }}-dnsprobe:{{ .Values.dnsprobe.service.port }}"
            {{- else if eq .Values.dnsprobe.mode "internal" }}
            - name: ENABLE_DNSPROBE
              value: "true"
            {{- if .Values.dnsprobe.workers }}
            - name: DNSPROBE_WORKERS
              value: "{{ .Values.dnsprobe.workers }}"
            {{- end }}
            {{- if .Values.dnsprobe.unboundDebugLevel }}
            - name: UNBOUND_DEBUG_LEVEL
              value: "{{ .Values.dnsprobe.unboundDebugLevel }}"
            {{- end }}
            {{- else if eq .Values.dnsprobe.mode "disabled" }}
            - name: ENABLE_DNSPROBE
              value: "false"
            {{- end }}
            {{- if .Values.api.valkeyURL }}
            - name: VALKEY_URL
              value: {{ .Values.api.valkeyURL | quote }}
            {{- if .Values.api.s3Bucket }}
            - name: S3_BUCKET
              value: {{ .Values.api.s3Bucket | quote }}
            {{- if .Values.api.s3Endpoint }}
            - name: S3_ENDPOINT
              value: {{ .Values.api.s3Endpoint | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if .Values.api.awsSecret }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.awsSecret }}
                  key: accessKeyID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.awsSecret }}
                  key: secretAccessKey  
            {{- end }}
            - name: ENABLE_SCOREBOARD
              value: {{ .Values.api.scoreboard.enabled | quote | default "true" }}
            - name: CRAWL_JOBS
              value: {{ .Values.api.crawlJobs | quote }}
            - name: TIMEOUT
              value: {{ .Values.api.timeout | quote }}
            {{- if .Values.api.crawlTimeout }}
            - name: CRAWL_TIMEOUT
              value: {{ .Values.api.crawlTimeout | quote }}
            {{- end }}
            - name: ENABLE_WHOIS
              value: {{ .Values.api.whois.enabled | quote | default "true" }}
            {{- if .Values.api.whois.cacheTTL }}
            - name: WHOIS_CACHE_TTL
              value: {{ .Values.api.whois.cacheTTL | quote }}
            {{- end }}
            {{- if .Values.api.results.cacheTTL }}
            - name: RESULT_CACHE_TTL
              value: {{ .Values.api.results.cacheTTL | quote }}
            {{- end }}
            {{- if .Values.api.results.errorCacheTTL }}
            - name: ERROR_CACHE_TTL
              value: {{ .Values.api.results.errorCacheTTL | quote }}
            {{- end }}
            {{- if .Values.api.results.archiveTTL }}
            - name: RESULT_ARCHIVE_TTL
              value: {{ .Values.api.results.archiveTTL | quote }}
            {{- end }}
            - name: PORT
              value: {{ .Values.api.port | quote }}
            - name: GUNICORN_CMD_ARGS
              value: "--threads {{ .Values.api.gunicornThreads }}"
            - name: ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.adminSecret.name | default (include "webres6.fullname" .) }}
                  key: admin-key
            {{- if .Values.otel.enabled }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.otel.serviceName | default "webres6-api" | quote }}
            - name: OTEL_SERVICE_VERSION
              value: {{ .Chart.AppVersion | quote }}
            - name: OTEL_DEPLOYMENT_ENVIRONMENT
              value: {{ .Values.otel.environment | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_TRACES_SAMPLER
              value: {{ .Values.otel.sampler | quote }}
            {{- if .Values.otel.samplerArg }}
            - name: OTEL_TRACES_SAMPLER_ARG
              value: {{ .Values.otel.samplerArg | quote }}
            {{- end }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: {{ .Values.otel.resourceAttributes | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.api.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.api.port }}
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 1
          livenessProbe:
            httpGet:
              path: /ping
              port: {{ .Values.api.port }}
            periodSeconds: 60
            timeoutSeconds: 30
            failureThreshold: 10
          volumeMounts:
            - name: serverconfig
              mountPath: /app/serverconfig
              readOnly: true
          {{- with .Values.api.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: serverconfig
          configMap:
            name: {{ include "webres6.fullname" . }}-serverconfig
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
