{{- if and .Values.adminSecret.enabled .Values.adminSecret.create -}}
apiVersion: v1
kind: Secret
metadata:
  # SPDX-FileCopyrightText: 2025 SAP SE and IPv6 Web Resource Checker contributors
  # SPDX-License-Identifier: Apache-2.0
  name: {{ .Values.adminSecret.secretName | default (include "webres6.fullname" .) }}
  labels:
    {{- include "webres6.labels" . | nindent 4 }}
  {{- with .Values.adminSecret.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{- /* Generate random string of specified length if not provided */}}
  {{ .Values.adminSecret.secretKey | default "admin-key" }}: {{ randAlphaNum (.Values.adminSecret.keyLength | default 32 | int) | b64enc | quote }}
{{- end }}