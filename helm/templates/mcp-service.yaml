{{- if .Values.mcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  # SPDX-FileCopyrightText: 2026 SAP SE and IPv6 Web Resource Checker contributors
  # SPDX-License-Identifier: Apache-2.0
  name: {{ include "webres6.fullname" . }}-mcp
  labels:
    {{- include "webres6.labels" . | nindent 4 }}
spec:
  type: {{ .Values.mcp.service.type }}
  ports:
    - port: {{ .Values.mcp.service.port }}
      targetPort: {{ .Values.mcp.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "webres6.selectorLabels" . | nindent 4 }}
    {{- with .Values.mcp.podLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    app: webres6-mcp
{{- end }}
