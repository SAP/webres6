name: Build Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'viewer/**'
      - 'dnsprobe/**'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - 'viewer/**'
      - 'dnsprobe/**'

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: api/Dockerfile
            image: ghcr.io/sap/webres6-api
          - service: viewer
            dockerfile: viewer/Dockerfile
            image: ghcr.io/sap/webres6-viewer
          - service: dnsprobe
            dockerfile: dnsprobe/Dockerfile
            image: ghcr.io/sap/webres6-dnsprobe

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ matrix.image }}@${{ steps.build.outputs.digest }}
          artifact-name: sbom-${{ matrix.service }}.spdx.json
          output-file: sbom-${{ matrix.service }}.spdx.json
          format: spdx-json

      - name: Attest SBOM
        if: github.event_name != 'pull_request'
        uses: actions/attest-sbom@v2
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom-${{ matrix.service }}.spdx.json
