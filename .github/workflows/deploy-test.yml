name: Deploy to test namespace

on:
  workflow_run:
    workflows: ["Build Docker Images"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Helm upgrade – test namespace
    runs-on: ubuntu-latest
    # GitHub Environment "test" provides SHOOT_API_URL and SHOOT_CA_DISCOVERY_URL.
    # Setup instructions: deploy/README.md
    environment: test
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Resolve image tag
        id: tag
        run: |
          echo "value=sha-$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Shoot cluster
        uses: gardener/cc-utils/.github/actions/kubernetes-auth@85be6ceff4a98696b20f37b41c580a171bb217f5
        with:
          server: ${{ vars.SHOOT_API_URL }}
          server-ca-discovery-url: ${{ vars.SHOOT_CA_DISCOVERY_URL }}
          audience: webres6-deploy

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Helm upgrade
        env:
          KUBECONFIG: kubeconfig.yaml
          HELM_RELEASE: ${{ vars.HELM_RELEASE }}
          NAMESPACE: ${{ vars.NAMESPACE }}
        run: |
          # Read values from the live release. If none exists yet, bootstrap manually first.
          # See deploy/README.md – "Deploy manually once"
          if ! helm get values "${HELM_RELEASE}" -n "${NAMESPACE}" -o yaml > current-values.yaml 2>/dev/null; then
            echo "No existing release found in namespace '${NAMESPACE}'."
            echo "Bootstrap the first deployment manually. See deploy/README.md for instructions."
            exit 1
          fi
          helm upgrade --install "${HELM_RELEASE}" ./helm \
            -n "${NAMESPACE}" \
            -f helm/values.yaml \
            -f current-values.yaml \
            --set image.repository=ghcr.io/sap/ \
            --set image.tag=${{ steps.tag.outputs.value }} \
            --wait --timeout 5m
