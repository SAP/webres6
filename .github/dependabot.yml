version: 2

multi-ecosystem-groups:
  docker:
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "selenium-grid"
        versions: ["1.0.0"]
    groups:
      selenium:
        patterns: ["selenium*"]
      valkey:
        patterns: ["valkey*"]
      telemetry:
        patterns: ["opentelemetry*", "otel*", "jaeger*"]

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies]
    groups:
      all:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /api
    schedule:
      interval: weekly
    labels: [dependencies]
    groups:
      opentelemetry:
        patterns: ["opentelemetry-*"]

  - package-ecosystem: docker
    directory: /api
    multi-ecosystem-group: docker
    patterns: ["*"]
    labels: [dependencies]

  - package-ecosystem: pip
    directory: /cli
    schedule:
      interval: weekly
    labels: [dependencies]
    groups:
      all:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /mcp
    schedule:
      interval: weekly
    labels: [dependencies]
    groups:
      all:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /mcp
    multi-ecosystem-group: docker
    patterns: ["*"]
    labels: [dependencies]

  - package-ecosystem: docker
    directory: /viewer
    multi-ecosystem-group: docker
    patterns: ["*"]
    labels: [dependencies]

  - package-ecosystem: docker-compose
    directory: /
    multi-ecosystem-group: docker
    patterns: ["*"]
    labels: [dependencies]

  - package-ecosystem: helm
    directory: /helm
    multi-ecosystem-group: docker
    labels: [dependencies]
