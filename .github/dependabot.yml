version: 2

multi-ecosystem-groups:
  docker:
    schedule:
      interval: "weekly"

updates:
  - package-ecosystem: pip
    directory: /api
    schedule:
      interval: weekly
    labels: [dependencies]
    groups:
      opentelemetry:
        patterns: ["opentelemetry-*"]

  - package-ecosystem: pip
    directory: /cli
    schedule:
      interval: weekly
    labels: [dependencies]
    groups:
      all:
        patterns: ["*"]
  
  - package-ecosystem: docker
    directory: /api
    multi-ecosystem-group: docker
    patterns: ["*"]
    labels: [dependencies]

  - package-ecosystem: docker
    directory: /viewer
    multi-ecosystem-group: docker
    patterns: ["*"]
    labels: [dependencies]

  - package-ecosystem: docker-compose
    directory: /
    multi-ecosystem-group: docker
    patterns: ["*"]
    labels: [dependencies]

  - package-ecosystem: helm
    directory: /helm
    schedule:
      interval: weekly
    labels: [dependencies]
    ignore:
      - dependency-name: "selenium-grid"
        versions: ["1.0.0"]
